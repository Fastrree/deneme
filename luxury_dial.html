<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Chronograph Dial - AAA Grade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #888;
            font-size: 12px;
            pointer-events: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="loading">ENGINEERING DIAL...</div>
    <div id="info">Drag to rotate • Scroll to zoom • Right-click drag to pan</div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // =====================================================================
        // SCENE SETUP
        // =====================================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 85);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 40;
        controls.maxDistance = 150;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        const envMap = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;
        scene.environment = envMap;

        // =====================================================================
        // MATERIAL SYSTEM - Multiple Metal Types
        // =====================================================================
        
        // Brushed Steel - Base dial material
        const brushedSteelMaterial = new THREE.MeshStandardMaterial({
            color: 0xc0c0c0,
            metalness: 0.95,
            roughness: 0.35,
            side: THREE.DoubleSide
        });

        // Polished Steel - High reflectivity
        const polishedSteelMaterial = new THREE.MeshStandardMaterial({
            color: 0xd0d0d0,
            metalness: 1.0,
            roughness: 0.08,
            side: THREE.DoubleSide
        });

        // Champagne Gold - Warm luxury tone
        const champagneGoldMaterial = new THREE.MeshStandardMaterial({
            color: 0xf5e6c8,
            metalness: 0.9,
            roughness: 0.15,
            side: THREE.DoubleSide
        });

        // Black Titanium - Dark premium
        const blackTitaniumMaterial = new THREE.MeshStandardMaterial({
            color: 0x2a2a2a,
            metalness: 0.85,
            roughness: 0.25,
            side: THREE.DoubleSide
        });

        // Rose Gold Accents
        const roseGoldMaterial = new THREE.MeshStandardMaterial({
            color: 0xe8b4a0,
            metalness: 0.92,
            roughness: 0.12,
            side: THREE.DoubleSide
        });

        // Sunburst finish material (anisotropic illusion)
        const sunburstMaterial = new THREE.MeshStandardMaterial({
            color: 0xb8b8b8,
            metalness: 0.98,
            roughness: 0.2,
            side: THREE.DoubleSide
        });

        // =====================================================================
        // PROCEDURAL TEXTURE GENERATORS
        // =====================================================================
        
        function createSunburstTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 2048;
            const ctx = canvas.getContext('2d');
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = Math.sqrt(centerX * centerX + centerY * centerY);
            
            const imageData = ctx.createImageData(canvas.width, canvas.height);
            const data = imageData.data;
            
            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const angle = Math.atan2(dy, dx);
                    const radius = Math.sqrt(dx * dx + dy * dy);
                    
                    // Radial brushing pattern
                    const brushPattern = Math.sin(angle * 180 + radius * 0.02) * 0.5 + 0.5;
                    const radialGradient = 1 - (radius / maxRadius);
                    
                    const idx = (y * canvas.width + x) * 4;
                    const brightness = Math.floor((0.6 + brushPattern * 0.2 + radialGradient * 0.2) * 255);
                    
                    data[idx] = brightness;
                    data[idx + 1] = brightness;
                    data[idx + 2] = brightness;
                    data[idx + 3] = 255;
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        function createBrushedMetalTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            const imageData = ctx.createImageData(canvas.width, canvas.height);
            const data = imageData.data;
            
            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const idx = (y * canvas.width + x) * 4;
                    
                    // Horizontal brush strokes with noise
                    const brushNoise = Math.sin(x * 0.1) * 0.3 + Math.random() * 0.1;
                    const verticalVariation = Math.sin(y * 0.05) * 0.1;
                    const brightness = Math.floor((0.7 + brushNoise + verticalVariation) * 255);
                    
                    data[idx] = brightness;
                    data[idx + 1] = brightness;
                    data[idx + 2] = brightness;
                    data[idx + 3] = 255;
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        function createGrooveTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            
            for (let i = 0; i < 20; i++) {
                const radius = 20 + i * 24;
                ctx.beginPath();
                ctx.arc(canvas.width / 2, canvas.height / 2, radius, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        // =====================================================================
        // MAIN DIAL GROUP
        // =====================================================================
        const dialGroup = new THREE.Group();
        scene.add(dialGroup);

        // =====================================================================
        // LAYER 1: BASE METAL PLATE
        // =====================================================================
        function createBasePlate() {
            const baseShape = new THREE.Shape();
            baseShape.absarc(0, 0, 22, 0, Math.PI * 2, false);
            
            const extrudeSettings = {
                depth: 0.8,
                bevelEnabled: true,
                bevelThickness: 0.3,
                bevelSize: 0.2,
                bevelSegments: 8,
                curveSegments: 64
            };
            
            const geometry = new THREE.ExtrudeGeometry(baseShape, extrudeSettings);
            const mesh = new THREE.Mesh(geometry, brushedSteelMaterial);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.z = -2;
            return mesh;
        }
        dialGroup.add(createBasePlate());

        // =====================================================================
        // LAYER 2: SUNBURST SURFACE
        // =====================================================================
        function createSunburstSurface() {
            const sunburstShape = new THREE.Shape();
            sunburstShape.absarc(0, 0, 21.5, 0, Math.PI * 2, false);
            
            const holeShape = new THREE.Path();
            holeShape.absarc(0, 0, 18, 0, Math.PI * 2, true);
            sunburstShape.holes.push(holeShape);
            
            const extrudeSettings = {
                depth: 0.3,
                bevelEnabled: true,
                bevelThickness: 0.1,
                bevelSize: 0.08,
                bevelSegments: 4,
                curveSegments: 128
            };
            
            const geometry = new THREE.ExtrudeGeometry(sunburstShape, extrudeSettings);
            const mesh = new THREE.Mesh(geometry, sunburstMaterial);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.z = -1.2;
            
            // Add radial gradient effect via vertex colors
            const positions = geometry.attributes.position;
            const colors = [];
            
            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                const dist = Math.sqrt(x * x + y * y) / 21.5;
                
                // Subtle radial variation
                const r = 0.72 + dist * 0.08;
                const g = 0.72 + dist * 0.08;
                const b = 0.72 + dist * 0.08;
                
                colors.push(r, g, b);
            }
            
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            mesh.material = mesh.material.clone();
            mesh.material.vertexColors = true;
            
            return mesh;
        }
        dialGroup.add(createSunburstSurface());

        // =====================================================================
        // LAYER 3: CHAPTER RING (Elevated outer ring with bevels)
        // =====================================================================
        function createChapterRing() {
            const chapterShape = new THREE.Shape();
            chapterShape.absarc(0, 0, 21.5, 0, Math.PI * 2, false);
            
            const holeShape = new THREE.Path();
            holeShape.absarc(0, 0, 19.5, 0, Math.PI * 2, true);
            chapterShape.holes.push(holeShape);
            
            const extrudeSettings = {
                depth: 0.5,
                bevelEnabled: true,
                bevelThickness: 0.15,
                bevelSize: 0.12,
                bevelSegments: 8,
                curveSegments: 128
            };
            
            const geometry = new THREE.ExtrudeGeometry(chapterShape, extrudeSettings);
            const mesh = new THREE.Mesh(geometry, champagneGoldMaterial);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.z = -0.8;
            return mesh;
        }
        dialGroup.add(createChapterRing());

        // =====================================================================
        // LAYER 4: APPLIED HOUR INDICES (3D elevated markers)
        // =====================================================================
        function createHourIndices() {
            const indicesGroup = new THREE.Group();
            
            for (let i = 0; i < 12; i++) {
                const angle = (i * 30 - 90) * Math.PI / 180;
                const radius = 17.5;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                
                // Create baton-style index with chamfered edges
                const indexShape = new THREE.Shape();
                const width = i % 3 === 0 ? 0.9 : 0.5;  // Larger at 12, 3, 6, 9
                const height = i % 3 === 0 ? 2.5 : 1.8;
                
                indexShape.moveTo(-width/2, -height/2);
                indexShape.lineTo(width/2, -height/2);
                indexShape.lineTo(width/2, height/2);
                indexShape.lineTo(-width/2, height/2);
                indexShape.closePath();
                
                const extrudeSettings = {
                    depth: 0.4,
                    bevelEnabled: true,
                    bevelThickness: 0.08,
                    bevelSize: 0.06,
                    bevelSegments: 4,
                    curveSegments: 8
                };
                
                const geometry = new THREE.ExtrudeGeometry(indexShape, extrudeSettings);
                const material = i % 3 === 0 ? roseGoldMaterial : champagneGoldMaterial;
                const mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.position.set(x, y, 0.6);
                mesh.rotation.z = angle + Math.PI / 2;
                
                indicesGroup.add(mesh);
                
                // Add subtle glow insert for larger indices
                if (i % 3 === 0) {
                    const insertShape = new THREE.Shape();
                    insertShape.absarc(0, 0, 0.3, 0, Math.PI * 2, false);
                    
                    const insertExtrude = {
                        depth: 0.15,
                        bevelEnabled: false,
                        curveSegments: 16
                    };
                    
                    const insertGeo = new THREE.ExtrudeGeometry(insertShape, insertExtrude);
                    const insertMat = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        emissive: 0x444444,
                        emissiveIntensity: 0.3
                    });
                    const insertMesh = new THREE.Mesh(insertGeo, insertMat);
                    insertMesh.position.set(0, 0, 0.45);
                    mesh.add(insertMesh);
                }
            }
            
            return indicesGroup;
        }
        dialGroup.add(createHourIndices());

        // =====================================================================
        // LAYER 5: MINUTE MARKERS (60 precision markers)
        // =====================================================================
        function createMinuteMarkers() {
            const markersGroup = new THREE.Group();
            
            for (let i = 0; i < 60; i++) {
                const angle = (i * 6 - 90) * Math.PI / 180;
                const isHour = i % 5 === 0;
                
                if (!isHour) {
                    const radius = 19.8;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    
                    const markerShape = new THREE.Shape();
                    markerShape.moveTo(-0.08, -0.4);
                    markerShape.lineTo(0.08, -0.4);
                    markerShape.lineTo(0.08, 0.4);
                    markerShape.lineTo(-0.08, 0.4);
                    markerShape.closePath();
                    
                    const extrudeSettings = {
                        depth: 0.1,
                        bevelEnabled: false,
                        curveSegments: 4
                    };
                    
                    const geometry = new THREE.ExtrudeGeometry(markerShape, extrudeSettings);
                    const mesh = new THREE.Mesh(geometry, polishedSteelMaterial);
                    mesh.castShadow = true;
                    mesh.position.set(x, y, 0.3);
                    mesh.rotation.z = angle + Math.PI / 2;
                    
                    markersGroup.add(mesh);
                }
            }
            
            return markersGroup;
        }
        dialGroup.add(createMinuteMarkers());

        // =====================================================================
        // LAYER 6: MICRO TEXT DETAILS
        // =====================================================================
        function createTextDetails() {
            const textGroup = new THREE.Group();
            
            // Swiss-made marking at 6 o'clock
            const swissShape = new THREE.Shape();
            const swissText = "SWISS MADE";
            
            // Create simple geometric representation of text
            const createLetter = (char, x, y) => {
                const letterGroup = new THREE.Group();
                const letterHeight = 0.15;
                const letterWidth = 0.12;
                
                // Simplified block letters using rectangles
                const patterns = {
                    'S': [[0,0], [0.3,0], [0,0.2], [0.3,0.2], [0,0.4], [0.3,0.4]],
                    'W': [[0,0], [0.1,0.4], [0.2,0], [0.3,0.4], [0.4,0]],
                    'I': [[0.15,0], [0.15,0.4]],
                    'M': [[0,0], [0.1,0.4], [0.2,0], [0.3,0.4], [0.4,0]],
                    'A': [[0,0], [0.2,0.4], [0.4,0], [0.1,0.2], [0.3,0.2]],
                    'D': [[0,0], [0,0.4], [0.2,0.4], [0.2,0], [0,0]],
                    'E': [[0.2,0], [0,0], [0,0.2], [0.15,0.2], [0,0.4], [0.2,0.4]]
                };
                
                return letterGroup;
            };
            
            // Text placeholder using small geometric elements
            const textPositions = [
                { text: "AUTOMATIC", y: 8, scale: 0.08 },
                { text: "CHRONOGRAPH", y: -8, scale: 0.07 },
                { text: "SWISS MADE", y: -14, scale: 0.05 }
            ];
            
            textPositions.forEach(pos => {
                for (let i = 0; i < pos.text.length; i++) {
                    const charWidth = 0.4 * pos.scale;
                    const x = (i - (pos.text.length - 1) / 2) * charWidth;
                    
                    const charShape = new THREE.Shape();
                    charShape.moveTo(x - 0.15 * pos.scale, -0.1 * pos.scale);
                    charShape.lineTo(x + 0.15 * pos.scale, -0.1 * pos.scale);
                    charShape.lineTo(x + 0.15 * pos.scale, 0.1 * pos.scale);
                    charShape.lineTo(x - 0.15 * pos.scale, 0.1 * pos.scale);
                    charShape.closePath();
                    
                    const extrudeSettings = {
                        depth: 0.05,
                        bevelEnabled: false
                    };
                    
                    const geometry = new THREE.ExtrudeGeometry(charShape, extrudeSettings);
                    const material = new THREE.MeshStandardMaterial({
                        color: 0x1a1a1a,
                        metalness: 0.7,
                        roughness: 0.4
                    });
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(x, pos.y, 0.35);
                    mesh.scale.setScalar(pos.scale * 2);
                    
                    textGroup.add(mesh);
                }
            });
            
            return textGroup;
        }
        dialGroup.add(createTextDetails());

        // =====================================================================
        // LAYER 7: SUBDIALS (3 recessed subdials with details)
        // =====================================================================
        function createSubdial(x, y, rotation, size, labelColor) {
            const subdialGroup = new THREE.Group();
            subdialGroup.position.set(x, y, 0);
            subdialGroup.rotation.z = rotation;
            
            // Recessed base
            const recessShape = new THREE.Shape();
            recessShape.absarc(0, 0, size, 0, Math.PI * 2, false);
            
            const recessExtrude = {
                depth: 0.25,
                bevelEnabled: true,
                bevelThickness: 0.08,
                bevelSize: 0.06,
                bevelSegments: 8,
                curveSegments: 64
            };
            
            const recessGeo = new THREE.ExtrudeGeometry(recessShape, recessExtrude);
            const recessMat = new THREE.MeshStandardMaterial({
                color: labelColor,
                metalness: 0.8,
                roughness: 0.3
            });
            const recessMesh = new THREE.Mesh(recessGeo, recessMat);
            recessMesh.receiveShadow = true;
            recessMesh.position.z = -0.15;
            subdialGroup.add(recessMesh);
            
            // Concentric groove rings
            for (let i = 0; i < 4; i++) {
                const grooveRadius = size * 0.3 + i * (size * 0.15);
                
                const grooveShape = new THREE.Shape();
                grooveShape.absarc(0, 0, grooveRadius + 0.08, 0, Math.PI * 2, false);
                
                const holeShape = new THREE.Path();
                holeShape.absarc(0, 0, grooveRadius, 0, Math.PI * 2, true);
                grooveShape.holes.push(holeShape);
                
                const grooveExtrude = {
                    depth: 0.08,
                    bevelEnabled: false,
                    curveSegments: 64
                };
                
                const grooveGeo = new THREE.ExtrudeGeometry(grooveShape, grooveExtrude);
                const grooveMesh = new THREE.Mesh(grooveGeo, polishedSteelMaterial);
                grooveMesh.position.z = 0.05;
                subdialGroup.add(grooveMesh);
            }
            
            // Subdial markers (12 markers)
            for (let i = 0; i < 12; i++) {
                const angle = (i * 30 - 90) * Math.PI / 180;
                const markerRadius = size * 0.85;
                const mx = Math.cos(angle) * markerRadius;
                const my = Math.sin(angle) * markerRadius;
                
                const markerShape = new THREE.Shape();
                markerShape.moveTo(-0.04, -0.2);
                markerShape.lineTo(0.04, -0.2);
                markerShape.lineTo(0.04, 0.2);
                markerShape.lineTo(-0.04, 0.2);
                markerShape.closePath();
                
                const markerExtrude = {
                    depth: 0.06,
                    bevelEnabled: false
                };
                
                const markerGeo = new THREE.ExtrudeGeometry(markerShape, markerExtrude);
                const markerMesh = new THREE.Mesh(markerGeo, champagneGoldMaterial);
                markerMesh.position.set(mx, my, 0.12);
                markerMesh.rotation.z = angle + Math.PI / 2;
                subdialGroup.add(markerMesh);
            }
            
            // Outer metallic ring
            const ringShape = new THREE.Shape();
            ringShape.absarc(0, 0, size, 0, Math.PI * 2, false);
            
            const ringHole = new THREE.Path();
            ringHole.absarc(0, 0, size * 0.92, 0, Math.PI * 2, true);
            ringShape.holes.push(ringHole);
            
            const ringExtrude = {
                depth: 0.1,
                bevelEnabled: true,
                bevelThickness: 0.04,
                bevelSize: 0.03,
                bevelSegments: 4,
                curveSegments: 64
            };
            
            const ringGeo = new THREE.ExtrudeGeometry(ringShape, ringExtrude);
            const ringMesh = new THREE.Mesh(ringGeo, roseGoldMaterial);
            ringMesh.position.z = 0.08;
            subdialGroup.add(ringMesh);
            
            // Miniature hand
            const handShape = new THREE.Shape();
            handShape.moveTo(-0.03, 0);
            handShape.lineTo(0.03, 0);
            handShape.lineTo(0.02, size * 0.7);
            handShape.lineTo(-0.02, size * 0.7);
            handShape.closePath();
            
            const handExtrude = {
                depth: 0.04,
                bevelEnabled: false
            };
            
            const handGeo = new THREE.ExtrudeGeometry(handShape, handExtrude);
            const handMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                metalness: 0.9,
                roughness: 0.1
            });
            const handMesh = new THREE.Mesh(handGeo, handMat);
            handMesh.position.z = 0.15;
            handMesh.rotation.z = Math.random() * Math.PI * 2;
            subdialGroup.add(handMesh);
            
            // Center pin for hand
            const pinShape = new THREE.Shape();
            pinShape.absarc(0, 0, 0.08, 0, Math.PI * 2, false);
            
            const pinExtrude = {
                depth: 0.06,
                bevelEnabled: true,
                bevelThickness: 0.03,
                bevelSize: 0.02,
                bevelSegments: 8,
                curveSegments: 16
            };
            
            const pinGeo = new THREE.ExtrudeGeometry(pinShape, pinExtrude);
            const pinMesh = new THREE.Mesh(pinGeo, polishedSteelMaterial);
            pinMesh.position.z = 0.18;
            subdialGroup.add(pinMesh);
            
            return subdialGroup;
        }

        // Add three subdials in chronograph layout
        dialGroup.add(createSubdial(-10, 6, 0, 3.5, 0xc0c0c0));   // Top-left: 30-min counter
        dialGroup.add(createSubdial(10, 6, 0, 3.5, 0xb8b8b8));    // Top-right: 12-hour counter
        dialGroup.add(createSubdial(0, -10, 0, 3.2, 0xa8a8a8));   // Bottom: running seconds

        // =====================================================================
        // LAYER 8: CENTER HUB (Mechanical center cap with details)
        // =====================================================================
        function createCenterHub() {
            const hubGroup = new THREE.Group();
            
            // Main hub cylinder
            const hubShape = new THREE.Shape();
            hubShape.absarc(0, 0, 2.5, 0, Math.PI * 2, false);
            
            const hubExtrude = {
                depth: 0.6,
                bevelEnabled: true,
                bevelThickness: 0.15,
                bevelSize: 0.12,
                bevelSegments: 12,
                curveSegments: 64
            };
            
            const hubGeo = new THREE.ExtrudeGeometry(hubShape, hubExtrude);
            const hubMesh = new THREE.Mesh(hubGeo, polishedSteelMaterial);
            hubMesh.castShadow = true;
            hubMesh.position.z = 0.4;
            hubGroup.add(hubMesh);
            
            // Secondary ring
            const ringShape = new THREE.Shape();
            ringShape.absarc(0, 0, 2.5, 0, Math.PI * 2, false);
            
            const ringHole = new THREE.Path();
            ringHole.absarc(0, 0, 2.0, 0, Math.PI * 2, true);
            ringShape.holes.push(ringHole);
            
            const ringExtrude = {
                depth: 0.3,
                bevelEnabled: true,
                bevelThickness: 0.08,
                bevelSize: 0.06,
                bevelSegments: 8,
                curveSegments: 64
            };
            
            const ringGeo = new THREE.ExtrudeGeometry(ringShape, ringExtrude);
            const ringMesh = new THREE.Mesh(ringGeo, roseGoldMaterial);
            ringMesh.position.z = 0.7;
            hubGroup.add(ringMesh);
            
            // Tiny screws (4 around the hub)
            for (let i = 0; i < 4; i++) {
                const angle = (i * 90 + 45) * Math.PI / 180;
                const screwX = Math.cos(angle) * 1.6;
                const screwY = Math.sin(angle) * 1.6;
                
                const screwHeadShape = new THREE.Shape();
                screwHeadShape.absarc(0, 0, 0.25, 0, Math.PI * 2, false);
                
                const screwExtrude = {
                    depth: 0.12,
                    bevelEnabled: true,
                    bevelThickness: 0.04,
                    bevelSize: 0.03,
                    bevelSegments: 8,
                    curveSegments: 16
                };
                
                const screwGeo = new THREE.ExtrudeGeometry(screwHeadShape, screwExtrude);
                const screwMat = new THREE.MeshStandardMaterial({
                    color: 0x3a3a3a,
                    metalness: 0.95,
                    roughness: 0.2
                });
                const screwMesh = new THREE.Mesh(screwGeo, screwMat);
                screwMesh.position.set(screwX, screwY, 0.75);
                
                // Screw slot
                const slotShape = new THREE.Shape();
                slotShape.moveTo(-0.15, -0.03);
                slotShape.lineTo(0.15, -0.03);
                slotShape.lineTo(0.15, 0.03);
                slotShape.lineTo(-0.15, 0.03);
                slotShape.closePath();
                
                const slotExtrude = {
                    depth: 0.05,
                    bevelEnabled: false
                };
                
                const slotGeo = new THREE.ExtrudeGeometry(slotShape, slotExtrude);
                const slotMat = new THREE.MeshStandardMaterial({
                    color: 0x1a1a1a,
                    metalness: 0.5,
                    roughness: 0.6
                });
                const slotMesh = new THREE.Mesh(slotGeo, slotMat);
                slotMesh.position.z = 0.08;
                slotMesh.rotation.z = angle;
                screwMesh.add(slotMesh);
                
                hubGroup.add(screwMesh);
            }
            
            // Center pin
            const pinShape = new THREE.Shape();
            pinShape.absarc(0, 0, 0.5, 0, Math.PI * 2, false);
            
            const pinExtrude = {
                depth: 0.4,
                bevelEnabled: true,
                bevelThickness: 0.1,
                bevelSize: 0.08,
                bevelSegments: 8,
                curveSegments: 32
            };
            
            const pinGeo = new THREE.ExtrudeGeometry(pinShape, pinExtrude);
            const pinMesh = new THREE.Mesh(pinGeo, polishedSteelMaterial);
            pinMesh.position.z = 0.9;
            hubGroup.add(pinMesh);
            
            return hubGroup;
        }
        dialGroup.add(createCenterHub());

        // =====================================================================
        // ADDITIONAL DETAIL LAYERS
        // =====================================================================
        
        // Decorative guilloche-inspired pattern
        function createGuillochePattern() {
            const patternGroup = new THREE.Group();
            
            // Create spiral groove pattern
            const spiralPoints = [];
            for (let i = 0; i < 720; i++) {
                const angle = (i / 720) * Math.PI * 8;
                const radius = 8 + (i / 720) * 8;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                spiralPoints.push(new THREE.Vector2(x, y));
            }
            
            const spiralShape = new THREE.Shape();
            spiralShape.moveTo(spiralPoints[0].x, spiralPoints[0].y);
            
            for (let i = 1; i < spiralPoints.length; i++) {
                spiralShape.lineTo(spiralPoints[i].x, spiralPoints[i].y);
            }
            
            const tubeGeo = new THREE.TubeGeometry(
                new THREE.CatmullRomCurve3(spiralPoints.map(p => new THREE.Vector3(p.x, p.y, 0))),
                200,
                0.03,
                8,
                false
            );
            
            const tubeMat = new THREE.MeshStandardMaterial({
                color: 0x888888,
                metalness: 0.8,
                roughness: 0.4
            });
            
            const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
            tubeMesh.position.z = -0.95;
            patternGroup.add(tubeMesh);
            
            return patternGroup;
        }
        dialGroup.add(createGuillochePattern());

        // Inner decorative ring with cutouts
        function createInnerDecorativeRing() {
            const ringGroup = new THREE.Group();
            
            const ringShape = new THREE.Shape();
            ringShape.absarc(0, 0, 14, 0, Math.PI * 2, false);
            
            const holeShape = new THREE.Path();
            holeShape.absarc(0, 0, 13.5, 0, Math.PI * 2, true);
            ringShape.holes.push(holeShape);
            
            const extrudeSettings = {
                depth: 0.15,
                bevelEnabled: true,
                bevelThickness: 0.05,
                bevelSize: 0.04,
                bevelSegments: 4,
                curveSegments: 128
            };
            
            const geometry = new THREE.ExtrudeGeometry(ringShape, extrudeSettings);
            const mesh = new THREE.Mesh(geometry, champagneGoldMaterial);
            mesh.position.z = -0.7;
            ringGroup.add(mesh);
            
            // Add diamond-cut facets around the ring
            for (let i = 0; i < 60; i++) {
                const angle = (i * 6) * Math.PI / 180;
                const facetX = Math.cos(angle) * 13.75;
                const facetY = Math.sin(angle) * 13.75;
                
                const facetShape = new THREE.Shape();
                facetShape.moveTo(-0.08, -0.15);
                facetShape.lineTo(0.08, -0.15);
                facetShape.lineTo(0.06, 0.15);
                facetShape.lineTo(-0.06, 0.15);
                facetShape.closePath();
                
                const facetExtrude = {
                    depth: 0.08,
                    bevelEnabled: true,
                    bevelThickness: 0.02,
                    bevelSize: 0.015,
                    bevelSegments: 2
                };
                
                const facetGeo = new THREE.ExtrudeGeometry(facetShape, facetExtrude);
                const facetMesh = new THREE.Mesh(facetGeo, polishedSteelMaterial);
                facetMesh.position.set(facetX, facetY, -0.55);
                facetMesh.rotation.z = angle + Math.PI / 2;
                ringGroup.add(facetMesh);
            }
            
            return ringGroup;
        }
        dialGroup.add(createInnerDecorativeRing());

        // =====================================================================
        // WATCH HANDS
        // =====================================================================
        function createWatchHands() {
            const handsGroup = new THREE.Group();
            
            // Hour hand
            const hourHandShape = new THREE.Shape();
            hourHandShape.moveTo(-0.25, 0);
            hourHandShape.lineTo(0.25, 0);
            hourHandShape.lineTo(0.18, 4);
            hourHandShape.lineTo(0.08, 5.5);
            hourHandShape.lineTo(-0.08, 5.5);
            hourHandShape.lineTo(-0.18, 4);
            hourHandShape.closePath();
            
            const hourHandExtrude = {
                depth: 0.08,
                bevelEnabled: true,
                bevelThickness: 0.03,
                bevelSize: 0.02,
                bevelSegments: 4
            };
            
            const hourHandGeo = new THREE.ExtrudeGeometry(hourHandShape, hourHandExtrude);
            const hourHandMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                metalness: 0.95,
                roughness: 0.15
            });
            const hourHandMesh = new THREE.Mesh(hourHandGeo, hourHandMat);
            hourHandMesh.position.z = 1.2;
            hourHandMesh.rotation.z = -Math.PI / 6; // 10 o'clock position
            handsGroup.add(hourHandMesh);
            
            // Minute hand
            const minuteHandShape = new THREE.Shape();
            minuteHandShape.moveTo(-0.18, 0);
            minuteHandShape.lineTo(0.18, 0);
            minuteHandShape.lineTo(0.12, 7);
            minuteHandShape.lineTo(0.06, 8.5);
            minuteHandShape.lineTo(-0.06, 8.5);
            minuteHandShape.lineTo(-0.12, 7);
            minuteHandShape.closePath();
            
            const minuteHandExtrude = {
                depth: 0.07,
                bevelEnabled: true,
                bevelThickness: 0.025,
                bevelSize: 0.02,
                bevelSegments: 4
            };
            
            const minuteHandGeo = new THREE.ExtrudeGeometry(minuteHandShape, minuteHandExtrude);
            const minuteHandMesh = new THREE.Mesh(minuteHandGeo, hourHandMat);
            minuteHandMesh.position.z = 1.3;
            minuteHandMesh.rotation.z = Math.PI / 4; // 2 o'clock position
            handsGroup.add(minuteHandMesh);
            
            // Seconds hand (thin, with counterweight)
            const secondsHandShape = new THREE.Shape();
            secondsHandShape.moveTo(-0.06, -1.5);
            secondsHandShape.lineTo(0.06, -1.5);
            secondsHandShape.lineTo(0.06, 9);
            secondsHandShape.lineTo(-0.06, 9);
            secondsHandShape.closePath();
            
            const secondsHandExtrude = {
                depth: 0.05,
                bevelEnabled: false
            };
            
            const secondsHandGeo = new THREE.ExtrudeGeometry(secondsHandShape, secondsHandExtrude);
            const secondsHandMat = new THREE.MeshStandardMaterial({
                color: 0xc41e3a,
                metalness: 0.9,
                roughness: 0.2
            });
            const secondsHandMesh = new THREE.Mesh(secondsHandGeo, secondsHandMat);
            secondsHandMesh.position.z = 1.4;
            secondsHandMesh.rotation.z = -Math.PI / 3;
            handsGroup.add(secondsHandMesh);
            
            // Seconds hand counterweight circle
            const counterWeightShape = new THREE.Shape();
            counterWeightShape.absarc(0, -1.5, 0.15, 0, Math.PI * 2, false);
            
            const counterWeightExtrude = {
                depth: 0.06,
                bevelEnabled: true,
                bevelThickness: 0.03,
                bevelSize: 0.02,
                bevelSegments: 8,
                curveSegments: 16
            };
            
            const counterWeightGeo = new THREE.ExtrudeGeometry(counterWeightShape, counterWeightExtrude);
            const counterWeightMesh = new THREE.Mesh(counterWeightGeo, roseGoldMaterial);
            counterWeightMesh.position.z = 0.06;
            secondsHandMesh.add(counterWeightMesh);
            
            // Center cap for hands
            const handCapShape = new THREE.Shape();
            handCapShape.absarc(0, 0, 0.35, 0, Math.PI * 2, false);
            
            const handCapExtrude = {
                depth: 0.15,
                bevelEnabled: true,
                bevelThickness: 0.05,
                bevelSize: 0.04,
                bevelSegments: 8,
                curveSegments: 32
            };
            
            const handCapGeo = new THREE.ExtrudeGeometry(handCapShape, handCapExtrude);
            const handCapMesh = new THREE.Mesh(handCapGeo, polishedSteelMaterial);
            handCapMesh.position.z = 1.5;
            handsGroup.add(handCapMesh);
            
            return handsGroup;
        }
        dialGroup.add(createWatchHands());

        // =====================================================================
        // LIGHTING SETUP
        // =====================================================================
        
        // Key light (main illumination)
        const keyLight = new THREE.DirectionalLight(0xffffee, 3);
        keyLight.position.set(50, 30, 50);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        keyLight.shadow.camera.near = 10;
        keyLight.shadow.camera.far = 200;
        keyLight.shadow.camera.left = -30;
        keyLight.shadow.camera.right = 30;
        keyLight.shadow.camera.top = 30;
        keyLight.shadow.camera.bottom = -30;
        scene.add(keyLight);
        
        // Fill light (softer, opposite side)
        const fillLight = new THREE.DirectionalLight(0xccddff, 1.5);
        fillLight.position.set(-30, 20, 40);
        scene.add(fillLight);
        
        // Rim light (edge highlighting)
        const rimLight = new THREE.DirectionalLight(0xffffff, 2);
        rimLight.position.set(0, -20, 30);
        scene.add(rimLight);
        
        // Ambient light (base illumination)
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        
        // Spotlights for dramatic highlights
        const spotLight1 = new THREE.SpotLight(0xffeedd, 5);
        spotLight1.position.set(20, 40, 30);
        spotLight1.angle = Math.PI / 6;
        spotLight1.penumbra = 0.5;
        spotLight1.castShadow = true;
        scene.add(spotLight1);
        
        const spotLight2 = new THREE.SpotLight(0xaaccff, 3);
        spotLight2.position.set(-25, 35, 25);
        spotLight2.angle = Math.PI / 6;
        spotLight2.penumbra = 0.5;
        scene.add(spotLight2);
        
        // Point lights for localized highlights
        const pointLight1 = new THREE.PointLight(0xffddaa, 2, 100);
        pointLight1.position.set(15, 15, 40);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0xaaddff, 1.5, 100);
        pointLight2.position.set(-15, -10, 35);
        scene.add(pointLight2);

        // =====================================================================
        // ANIMATION
        // =====================================================================
        const clock = new THREE.Clock();
        
        // Hide loading message
        document.getElementById('loading').style.display = 'none';
        
        function animate() {
            requestAnimationFrame(animate);
            
            const elapsed = clock.getElapsedTime();
            
            // Animate seconds hand
            const handsGroup = dialGroup.children.find(c => c.children.length > 3 && c.children.some(ch => ch.geometry?.attributes?.position?.count === 12));
            if (handsGroup) {
                const secondsHand = handsGroup.children.find(ch => ch.material?.color?.getHex() === 0xc41e3a);
                if (secondsHand) {
                    secondsHand.rotation.z = -Math.PI / 2 + elapsed * Math.PI / 30;
                }
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();

        // =====================================================================
        // WINDOW RESIZE HANDLER
        // =====================================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });

        // Initial camera adjustment for macro feel
        camera.position.set(0, 0, 70);
        controls.target.set(0, 0, 0);
        controls.update();
    </script>
</body>
</html>
