            buildBracelet() {
                const linkWidth = 0.22;
                const linkLength = 0.08;
                const linkThickness = 0.015;
                const totalLinks = CONFIG.braceletLinks;

                // Create articulated bracelet links
                for (let i = 0; i < totalLinks; i++) {
                    const isCenterLink = i % 3 === 1;
                    const linkGroup = new THREE.Group();

                    // Main link body
                    const linkShape = new THREE.Shape();
                    const width = isCenterLink ? linkWidth * 0.9 : linkWidth;
                    
                    linkShape.moveTo(-width / 2, -linkLength / 2);
                    linkShape.lineTo(width / 2, -linkLength / 2);
                    linkShape.lineTo(width / 2, linkLength / 2);
                    linkShape.lineTo(-width / 2, linkLength / 2);
                    linkShape.closePath();

                    const extrudeSettings = {
                        depth: linkThickness,
                        bevelEnabled: true,
                        bevelThickness: 0.002,
                        bevelSize: 0.002,
                        bevelSegments: 2
                    };

                    const linkGeo = new THREE.ExtrudeGeometry(linkShape, extrudeSettings);
                    const linkMat = isCenterLink ? this.materials.polishedSteel : this.materials.brushedTitanium;
                    const link = new THREE.Mesh(linkGeo, linkMat);
                    link.castShadow = true;
                    link.receiveShadow = true;
                    linkGroup.add(link);

                    // Brushed center stripe on polished links
                    if (isCenterLink) {
                        const stripeGeo = new THREE.BoxGeometry(width * 0.5, linkLength * 0.9, linkThickness + 0.001);
                        const stripeMat = this.materials.brushedTitanium;
                        const stripe = new THREE.Mesh(stripeGeo, stripeMat);
                        stripe.position.z = linkThickness / 2 + 0.0005;
                        linkGroup.add(stripe);
                    }

                    // Connector pins
                    const pinGeo = new THREE.CylinderGeometry(0.008, 0.008, 0.025, 16);
                    const pinMat = this.materials.polishedSteel;
                    
                    const pin1 = new THREE.Mesh(pinGeo, pinMat);
                    pin1.rotation.x = Math.PI / 2;
                    pin1.position.set(-width / 2 - 0.01, 0, linkThickness / 2);
                    linkGroup.add(pin1);

                    const pin2 = new THREE.Mesh(pinGeo, pinMat);
                    pin2.rotation.x = Math.PI / 2;
                    pin2.position.set(width / 2 + 0.01, 0, linkThickness / 2);
                    linkGroup.add(pin2);

                    // Position links in a curve
                    const curveAngle = (i / totalLinks - 0.5) * Math.PI * 0.6;
                    const radius = 1.5;
                    
                    linkGroup.position.set(
                        Math.sin(curveAngle) * radius,
                        -i * (linkLength * 0.85) + totalLinks * linkLength * 0.4,
                        -CONFIG.caseThickness / 2 - 0.05
                    );
                    linkGroup.rotation.z = curveAngle;

                    this.braceletGroup.add(linkGroup);
                    this.braceletLinks.push(linkGroup);
                }

                // Clasp at the end
                this.createClasp(totalLinks, linkWidth, linkLength);
            }

            createClasp(totalLinks, linkWidth, linkLength) {
                const claspGroup = new THREE.Group();

                // Clasp body
                const claspShape = new THREE.Shape();
                claspShape.moveTo(-linkWidth * 0.7, -linkLength * 0.5);
                claspShape.lineTo(linkWidth * 0.7, -linkLength * 0.5);
                claspShape.lineTo(linkWidth * 0.6, linkLength * 0.5);
                claspShape.lineTo(-linkWidth * 0.6, linkLength * 0.5);
                claspShape.closePath();

                const claspExtrudeSettings = {
                    depth: 0.02,
                    bevelEnabled: true,
                    bevelThickness: 0.003,
                    bevelSize: 0.003,
                    bevelSegments: 2
                };

                const claspGeo = new THREE.ExtrudeGeometry(claspShape, claspExtrudeSettings);
                const claspMat = this.materials.brushedTitanium;
                const clasp = new THREE.Mesh(claspGeo, claspMat);
                clasp.castShadow = true;
                claspGroup.add(clasp);

                // Engraving on clasp
                const engraveTexture = ProceduralTextureGenerator.createTypographyTexture('CHRONOS', 24, '#c9a962');
                const engraveGeo = new THREE.PlaneGeometry(linkWidth * 0.5, linkLength * 0.3);
                const engraveMat = new THREE.MeshBasicMaterial({
                    map: engraveTexture,
                    transparent: true
                });
                const engrave = new THREE.Mesh(engraveGeo, engraveMat);
                engrave.position.z = 0.021;
                claspGroup.add(engrave);

                // Deployment mechanism
                const leverGeo = new THREE.BoxGeometry(linkWidth * 0.3, linkLength * 0.4, 0.015);
                const leverMat = this.materials.polishedSteel;
                const lever = new THREE.Mesh(leverGeo, leverMat);
                lever.position.z = 0.028;
                claspGroup.add(lever);

                claspGroup.position.set(
                    0,
                    -totalLinks * (linkLength * 0.85) - linkLength,
                    -CONFIG.caseThickness / 2 - 0.05
                );
                this.braceletGroup.add(claspGroup);
            }

            buildRearAssembly() {
                // Exhibition caseback
                const rearRadius = CONFIG.caseDiameter / 2 - 0.05;

                // Glass exhibition window
                const rearGlassGeo = new THREE.CylinderGeometry(rearRadius, rearRadius, 0.03, 128);
                const rearGlassMat = this.materials.sapphire;
                const rearGlass = new THREE.Mesh(rearGlassGeo, rearGlassMat);
                rearGlass.rotation.x = Math.PI / 2;
                this.rearAssembly.add(rearGlass);

                // Rear bezel ring
                const rearBezelShape = new THREE.Shape();
                rearBezelShape.absarc(0, 0, rearRadius + 0.02, 0, Math.PI * 2, false);
                const rearHolePath = new THREE.Path();
                rearHolePath.absarc(0, 0, rearRadius - 0.02, 0, Math.PI * 2, true);
                rearBezelShape.holes.push(rearHolePath);

                const rearBezelExtrudeSettings = {
                    depth: 0.02,
                    bevelEnabled: true,
                    bevelThickness: 0.003,
                    bevelSize: 0.003,
                    bevelSegments: 2
                };

                const rearBezelGeo = new THREE.ExtrudeGeometry(rearBezelShape, rearBezelExtrudeSettings);
                const rearBezelMat = this.materials.brushedTitanium;
                const rearBezel = new THREE.Mesh(rearBezelGeo, rearBezelMat);
                rearBezel.position.z = -0.025;
                this.rearAssembly.add(rearBezel);

                // Screws around rear bezel
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const screwDist = rearRadius + 0.01;
                    
                    const screwGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.02, 6);
                    const screwMat = this.materials.polishedSteel;
                    const screw = new THREE.Mesh(screwGeo, screwMat);
                    screw.rotation.x = Math.PI / 2;
                    screw.position.set(
                        Math.cos(angle) * screwDist,
                        Math.sin(angle) * screwDist,
                        -0.015
                    );
                    this.rearAssembly.add(screw);
                }

                // Engraved text on rear
                const serialTexture = ProceduralTextureGenerator.createTypographyTexture('NO. 0001/1000', 20, '#888888');
                const serialGeo = new THREE.PlaneGeometry(0.3, 0.08);
                const serialMat = new THREE.MeshBasicMaterial({
                    map: serialTexture,
                    transparent: true
                });
                const serial = new THREE.Mesh(serialGeo, serialMat);
                serial.position.set(0, rearRadius * 0.7, -0.01);
                serial.rotation.x = Math.PI / 2;
                this.rearAssembly.add(serial);
            }
        }

        // ============================================
        // LIGHTING SYSTEM
        // ============================================
        class LightingSystem {
            constructor(scene) {
                this.scene = scene;
                this.setupLights();
            }

            setupLights() {
                // Ambient light (subtle fill)
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
                this.scene.add(ambientLight);

                // Main key light
                const keyLight = new THREE.PointLight(0xffffff, 2.0, 10);
                keyLight.position.set(3, 3, 3);
                this.scene.add(keyLight);

                // Fill light
                const fillLight = new THREE.PointLight(0xffffff, 0.8, 10);
                fillLight.position.set(-3, 2, 2);
                this.scene.add(fillLight);

                // Rim light for edges
                const rimLight = new THREE.PointLight(0xffffff, 1.5, 10);
                rimLight.position.set(0, -3, 3);
                this.scene.add(rimLight);

                // Top spotlight
                const topLight = new THREE.DirectionalLight(0xffffff, 1.2);
                topLight.position.set(0, 5, 2);
                this.scene.add(topLight);

                // Bottom fill
                const bottomLight = new THREE.PointLight(0xffffff, 0.5, 10);
                bottomLight.position.set(0, -2, -2);
                this.scene.add(bottomLight);

                // Accent lights for drama
                const accentLight1 = new THREE.PointLight(0xc9a962, 0.8, 8);
                accentLight1.position.set(2, 1, -2);
                this.scene.add(accentLight1);

                const accentLight2 = new THREE.PointLight(0x4466aa, 0.5, 8);
                accentLight2.position.set(-2, -1, 2);
                this.scene.add(accentLight2);

                // Hemisphere light for natural sky simulation
                const hemiLight = new THREE.HemisphereLight(0xffffff, 0x1a1a1a, 0.3);
                this.scene.add(hemiLight);

                this.lights = [keyLight, fillLight, rimLight, topLight, bottomLight, accentLight1, accentLight2];
            }

            animate(time) {
                // Subtle light movement for dynamic reflections
                this.lights.forEach((light, i) => {
                    if (light instanceof THREE.PointLight) {
                        const offset = i * 0.5;
                        light.position.x += Math.sin(time * 0.5 + offset) * 0.002;
                        light.position.y += Math.cos(time * 0.3 + offset) * 0.002;
                    }
                });
            }
        }

        // ============================================
        // ENVIRONMENT SYSTEM
        // ============================================
        class EnvironmentSystem {
            constructor(scene, renderer) {
                this.scene = scene;
                this.renderer = renderer;
                this.createEnvironment();
            }

            createEnvironment() {
                // Create procedural environment map for reflections
                const cubeSize = 512;
                const renderTarget = new THREE.WebGLCubeRenderTarget(cubeSize);
                renderTarget.texture.type = THREE.HalfFloatType;

                // Create environment camera
                this.envCamera = new THREE.PerspectiveCamera(90, 1, 0.1, 1000);
                this.envCamera.position.set(0, 0, 0);

                // Create environment scene with gradient
                const envScene = new THREE.Scene();
                
                // Gradient background
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');

                // Dark studio gradient
                const gradient = ctx.createLinearGradient(0, 0, 0, 512);
                gradient.addColorStop(0, '#0a0a0a');
                gradient.addColorStop(0.5, '#1a1a1a');
                gradient.addColorStop(1, '#0a0a0a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 512, 512);

                // Add soft light panels
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.fillRect(100, 50, 312, 100);
                ctx.fillRect(50, 300, 412, 80);

                const texture = new THREE.CanvasTexture(canvas);
                envScene.background = texture;

                this.envScene = envScene;
                this.renderTarget = renderTarget;
                this.scene.environment = renderTarget.texture;
                this.scene.background = new THREE.Color(0x050505);
            }

            update(camera) {
                // Update environment reflections
                const originalBackground = this.scene.background;
                this.scene.background = null;
                
                // Render environment from object's perspective
                this.envCamera.position.copy(camera.position);
                this.envCamera.quaternion.copy(camera.quaternion);
                
                this.renderer.setRenderTarget(this.renderTarget);
                this.renderer.render(this.envScene, this.envCamera);
                this.renderer.setRenderTarget(null);
                
                this.scene.background = originalBackground;
            }
        }

        // ============================================
        // MAIN APPLICATION
        // ============================================
        class WatchExperience {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.watch = null;
                this.clock = new THREE.Clock();
                this.currentSection = 1;
                this.isExploded = false;
                this.originalPositions = new Map();

                this.init();
            }

            async init() {
                this.showLoadingProgress(10);
                
                // Setup Three.js
                this.setupScene();
                this.setupCamera();
                this.setupRenderer();
                
                this.showLoadingProgress(30);

                // Create materials
                this.materials = new MaterialLibrary();
                
                this.showLoadingProgress(45);

                // Build watch
                this.watchBuilder = new WatchBuilder(this.materials);
                this.watch = this.watchBuilder.buildCompleteWatch();
                this.scene.add(this.watch);
                
                this.showLoadingProgress(65);

                // Setup lighting
                this.lighting = new LightingSystem(this.scene);
                
                this.showLoadingProgress(80);

                // Setup environment
                this.environment = new EnvironmentSystem(this.scene, this.renderer);
                
                this.showLoadingProgress(90);

                // Store original positions for explosion
                this.storeOriginalPositions();

                // Setup animations
                this.setupAnimations();
                
                this.showLoadingProgress(100);

                // Hide loading screen
                setTimeout(() => {
                    this.hideLoadingScreen();
                    this.startIntroAnimation();
                }, 500);

                // Start render loop
                this.animate();

                // Handle resize
                window.addEventListener('resize', () => this.onResize());
            }

            showLoadingProgress(percent) {
                const progress = document.getElementById('progress');
                progress.style.width = percent + '%';
            }

            hideLoadingScreen() {
                const loading = document.getElementById('loading');
                loading.style.opacity = '0';
                setTimeout(() => {
                    loading.style.display = 'none';
                }, 1000);
            }

            setupScene() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x050505, 0.02);
            }

            setupCamera() {
                this.camera = new THREE.PerspectiveCamera(
                    45,
                    window.innerWidth / window.innerHeight,
                    0.01,
                    100
                );
                this.camera.position.set(3, 2, 3);
                this.camera.lookAt(0, 0, 0);
            }

            setupRenderer() {
                this.renderer = new THREE.WebGLRenderer({
                    antialias: true,
                    powerPreference: 'high-performance'
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                this.renderer.physicallyCorrectLights = true;
                this.renderer.outputEncoding = THREE.sRGBEncoding;
                this.container.appendChild(this.renderer.domElement);
            }

            storeOriginalPositions() {
                // Store original positions for explosion animation
                this.watch.traverse((child) => {
                    if (child.isMesh || child.isGroup) {
                        this.originalPositions.set(child, {
                            position: child.position.clone(),
                            rotation: child.rotation.clone(),
                            scale: child.scale.clone()
                        });
                    }
                });
            }

            setupAnimations() {
                gsap.registerPlugin(ScrollTrigger);

                // Section tracking
                const sections = ['section1', 'section2', 'section3', 'section4', 'section5'];
                
                sections.forEach((sectionId, index) => {
                    const section = document.getElementById(sectionId);
                    
                    ScrollTrigger.create({
                        trigger: section,
                        start: 'top center',
                        end: 'bottom center',
                        onEnter: () => this.onSectionEnter(index + 1),
                        onLeaveBack: () => this.onSectionEnter(index + 1)
                    });
                });

                // Chapter indicators
                const dots = document.querySelectorAll('.chapter-dot');
                dots.forEach(dot => {
                    const chapter = parseInt(dot.dataset.chapter);
                    
                    ScrollTrigger.create({
                        trigger: `#section${chapter}`,
                        start: 'top center',
                        end: 'bottom center',
                        onEnter: () => this.updateChapterIndicator(chapter),
                        onLeaveBack: () => this.updateChapterIndicator(chapter)
                    });
                });
            }

            onSectionEnter(section) {
                this.currentSection = section;
                
                switch(section) {
                    case 1:
                        this.heroShot();
                        this.updateInfo('Movement', 'Automatic caliber with 72-hour power reserve');
                        break;
                    case 2:
                        this.macroDetail();
                        this.updateInfo('Craftsmanship', 'Every surface meticulously finished');
                        break;
                    case 3:
                        this.explodedView();
                        this.updateInfo('Engineering', 'Over 200 individual components');
                        break;
                    case 4:
                        this.mechanicalReveal();
                        this.updateInfo('Precision', 'Swiss-made mechanical movement');
                        break;
                    case 5:
                        this.reassembly();
                        this.updateInfo('Perfection', 'Assembled by master watchmakers');
                        break;
                }
            }

            updateChapterIndicator(chapter) {
                document.querySelectorAll('.chapter-dot').forEach(dot => {
                    dot.classList.toggle('active', parseInt(dot.dataset.chapter) === chapter);
                });
            }

            updateInfo(title, text) {
                const panel = document.getElementById('infoPanel');
                const titleEl = document.getElementById('infoTitle');
                const textEl = document.getElementById('infoText');

                gsap.to(panel, { opacity: 0, y: 20, duration: 0.3, onComplete: () => {
                    titleEl.textContent = title;
                    textEl.textContent = text;
                    gsap.to(panel, { opacity: 1, y: 0, duration: 0.5 });
                }});
            }

            heroShot() {
                // Reset to hero position
                gsap.to(this.camera.position, {
                    x: 3,
                    y: 2,
                    z: 3,
                    duration: 2,
                    ease: 'power2.inOut'
                });
                
                gsap.to(this.watch.rotation, {
                    y: 0,
                    duration: 2,
                    ease: 'power2.inOut'
                });

                // Reset explosion
                this.resetExplosion();
                
                this.isExploded = false;
            }

            macroDetail() {
                // Zoom in for macro details
                gsap.to(this.camera.position, {
                    x: 1.5,
                    y: 0.8,
                    z: 1.5,
                    duration: 2,
                    ease: 'power2.inOut'
                });

                gsap.to(this.watch.rotation, {
                    y: Math.PI / 6,
                    x: 0.2,
                    duration: 2,
                    ease: 'power2.inOut'
                });
            }

            explodedView() {
                this.isExploded = true;

                // Explode components
                gsap.to(this.crystalGroup?.position || this.watch.children[2].position, {
                    z: 0.5,
                    duration: 1.5,
                    ease: 'power2.out'
                });

                gsap.to(this.bezelGroup?.position || this.watch.children[1].position, {
                    z: 0.3,
                    duration: 1.5,
                    ease: 'power2.out',
                    delay: 0.2
                });

                gsap.to(this.dialGroup?.position || this.watch.children[3].position, {
                    z: 0.2,
                    duration: 1.5,
                    ease: 'power2.out',
                    delay: 0.3
                });

                gsap.to(this.handsGroup?.position || this.watch.children[4].position, {
                    z: 0.4,
                    duration: 1.5,
                    ease: 'power2.out',
                    delay: 0.1
                });

                gsap.to(this.movementGroup?.position || this.watch.children[5].position, {
                    z: -0.5,
                    duration: 1.5,
                    ease: 'power2.out',
                    delay: 0.4
                });

                gsap.to(this.caseGroup?.position || this.watch.children[0].position, {
                    y: 0.3,
                    duration: 1.5,
                    ease: 'power2.out'
                });

                // Camera adjustment
                gsap.to(this.camera.position, {
                    x: 4,
                    y: 1,
                    z: 4,
                    duration: 2,
                    ease: 'power2.inOut'
                });
            }

            mechanicalReveal() {
                // Keep exploded but animate movement
                if (!this.isExploded) {
                    this.explodedView();
                }

                // Activate gear animation
                this.gearsAnimating = true;
            }

            reassembly() {
                // Reverse explosion
                this.resetExplosion();
                this.isExploded = false;
                this.gearsAnimating = false;

                // Return to hero
                setTimeout(() => {
                    this.heroShot();
                }, 1500);
            }

            resetExplosion() {
                // Reset all components to original positions
                this.watch.traverse((child) => {
                    if (this.originalPositions.has(child)) {
                        const orig = this.originalPositions.get(child);
                        gsap.to(child.position, {
                            x: orig.position.x,
                            y: orig.position.y,
                            z: orig.position.z,
                            duration: 1.5,
                            ease: 'power2.inOut'
                        });
                    }
                });
            }

            startIntroAnimation() {
                // Initial fade in
                gsap.from(this.watch.scale, {
                    x: 0,
                    y: 0,
                    z: 0,
                    duration: 2,
                    ease: 'elastic.out(1, 0.5)'
                });

                // Hero typography
                gsap.to('.hero-title', {
                    opacity: 1,
                    y: 0,
                    duration: 1.5,
                    delay: 0.5,
                    ease: 'power3.out'
                });

                gsap.to('.hero-subtitle', {
                    opacity: 1,
                    y: 0,
                    duration: 1.5,
                    delay: 0.8,
                    ease: 'power3.out'
                });

                // Info panel
                gsap.to('#infoPanel', {
                    opacity: 1,
                    y: 0,
                    duration: 1,
                    delay: 2,
                    ease: 'power2.out'
                });
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                const time = this.clock.getElapsedTime();
                const delta = this.clock.getDelta();

                // Rotate watch slowly
                if (this.watch && !this.isExploded) {
                    this.watch.rotation.y = Math.sin(time * 0.2) * 0.3;
                    this.watch.rotation.x = Math.cos(time * 0.15) * 0.1;
                }

                // Animate watch hands
                if (this.watchBuilder) {
                    // Hour hand (12 hours = full rotation)
                    if (this.watchBuilder.hourHand) {
                        this.watchBuilder.hourHand.rotation.z = -(time * 0.0005) % (Math.PI * 2);
                    }

                    // Minute hand (60 minutes = full rotation)
                    if (this.watchBuilder.minuteHand) {
                        this.watchBuilder.minuteHand.rotation.z = -(time * 0.001) % (Math.PI * 2);
                    }

                    // Second hand (60 seconds = full rotation)
                    if (this.watchBuilder.secondHand) {
                        this.watchBuilder.secondHand.rotation.z = -(time * 0.1) % (Math.PI * 2);
                    }

                    // Subdial hands
                    this.watchBuilder.subdialHands.forEach(hand => {
                        if (hand.mesh) {
                            hand.mesh.rotation.z = -(time * hand.speed + hand.offset) % (Math.PI * 2);
                        }
                    });

                    // Movement gears
                    if (this.gearsAnimating) {
                        this.watchBuilder.gears.forEach(gear => {
                            if (gear.userData.speed) {
                                gear.rotation.z += gear.userData.speed * 0.02;
                            }
                        });

                        // Balance wheel oscillation
                        if (this.watchBuilder.balanceWheel) {
                            this.watchBuilder.balanceWheel.rotation.z = Math.sin(time * 8) * 0.3;
                        }
                    }
                }

                // Animate lights
                if (this.lighting) {
                    this.lighting.animate(time);
                }

                // Bracelet subtle movement
                if (this.watchBuilder && this.watchBuilder.braceletLinks.length > 0) {
                    this.watchBuilder.braceletLinks.forEach((link, i) => {
                        link.rotation.x = Math.sin(time * 2 + i * 0.2) * 0.02;
                    });
                }

                // Render
                this.renderer.render(this.scene, this.camera);
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            // Get references to watch groups
            get crystalGroup() {
                return this.watch?.children[2];
            }

            get bezelGroup() {
                return this.watch?.children[1];
            }

            get dialGroup() {
                return this.watch?.children[3];
            }

            get handsGroup() {
                return this.watch?.children[4];
            }

            get movementGroup() {
                return this.watch?.children[5];
            }

            get caseGroup() {
                return this.watch?.children[0];
            }
        }

        // ============================================
        // INITIALIZE EXPERIENCE
        // ============================================
        window.addEventListener('DOMContentLoaded', () => {
            new WatchExperience();
        });
    </script>
</body>
</html>
